<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="犬の横スクロールアクションゲーム Ver.0.1.1">
  <title>りっかの横スクロールアクション Ver.0.1.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell" aria-label="りっかの横スクロールアクションゲーム">
    <section class="game-panel">
      <canvas id="gameCanvas" width="960" height="540" aria-label="ゲーム画面"></canvas>

      <div id="titleScreen" class="screen-overlay is-visible">
        <div class="screen-card">
          <p class="screen-kicker">HTML5 Canvas Prototype</p>
          <h1>りっかの<br>おやつロード</h1>
          <p class="screen-text">穴と障害物を避けて、おやつを集めよう！</p>
          <button id="startButton" class="primary-button" type="button">START</button>
        </div>
      </div>

      <div id="gameOverScreen" class="screen-overlay" aria-live="polite">
        <div class="screen-card">
          <p class="screen-kicker">Ver.0.1.1</p>
          <h2>GAME OVER</h2>
          <p class="score-readout">最終スコア：<span id="finalScore">0</span></p>
          <button id="restartButton" class="primary-button" type="button">RESTART</button>
        </div>
      </div>
    </section>

    <section class="help-panel" aria-label="操作説明">
      <p><strong>PC:</strong> ← → で移動 / SPACE または ↑ でジャンプ</p>
      <p><strong>スマホ:</strong> 画面下のボタンを押しっぱなしで操作</p>
    </section>
  </main>

  <nav class="mobile-controls" aria-label="スマホ用操作ボタン">
    <button class="control-button" type="button" data-action="left" aria-label="左へ移動">左</button>
    <button class="control-button" type="button" data-action="jump" aria-label="ジャンプ">ジャンプ</button>
    <button class="control-button" type="button" data-action="right" aria-label="右へ移動">右</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
